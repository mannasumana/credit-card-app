<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Default Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Credit Card Default Predictor</h1>
            <p>Enter customer details to predict default risk</p>
        </div>

        <form method="POST" action="/predict" class="form-box">
            <input type="number" name="limit_bal" placeholder="Credit Limit" required>
            <input type="number" name="age" placeholder="Age" required>
            <input type="number" name="bill_amt1" placeholder="Bill Amount 1" required>
            <button type="submit">Predict Default Risk</button>
        </form>

        {% if prediction_text %}
        <div class="result-box">
            <h2>{{ prediction_text }}</h2>
        </div>
        {% endif %}
    </div>
</body>
</html>
